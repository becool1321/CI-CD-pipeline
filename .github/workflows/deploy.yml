name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker
        run: |
          cd /home/bigul/CI-CD-pipeline
          git fetch origin main
          git reset --hard origin/main
          docker compose up -d --build
	  docker image prune -f
